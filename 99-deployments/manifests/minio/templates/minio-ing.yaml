apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-api-ing
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.org/client-max-body-size: 50m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - {{ .Values.domain2 }}
  rules:
    - host: {{ .Values.domain2 }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-main
                port:
                  number: 9000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console-ing
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.org/client-max-body-size: 50m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - {{ .Values.domain1 }}
  rules:
    - host: {{ .Values.domain1 }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-main-console
                port:
                  number: 9001
